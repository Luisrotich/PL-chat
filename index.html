<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>PL Chat — Robbie & Precious</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, sans-serif;
      background: radial-gradient(circle at 30% 20%, #0f141f, #06090e);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
      position: relative;
    }

    /* premium phone frame */
    .phone-device {
      width: 100%;
      max-width: 400px;
      height: 750px;
      background: #0a0e17;
      border-radius: 48px;
      box-shadow: 0 30px 50px -20px rgba(0,0,0,0.6), 0 0 0 7px #2d3142, 0 0 0 11px #181c2c;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s ease;
    }

    /* dynamic notch area */
    .dynamic-notch {
      background: rgba(12, 15, 25, 0.95);
      backdrop-filter: blur(12px);
      width: 120px;
      height: 32px;
      border-radius: 28px;
      margin: 12px auto 6px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      border: 0.5px solid rgba(255,255,240,0.12);
      flex-shrink: 0;
    }
    .dynamic-notch span {
      font-size: 12px;
      font-weight: 500;
      color: #eef3ff;
      letter-spacing: 0.2px;
    }

    .chat-app {
      display: flex;
      flex-direction: column;
      flex: 1;
      background: #0b101a;
      overflow: hidden;
    }

    /* modern header */
    .chat-header {
      background: rgba(16, 22, 36, 0.96);
      backdrop-filter: blur(18px);
      padding: 12px 18px;
      border-bottom: 0.6px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
    }
    .brand h2 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, #f0f3ff, #b9c8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.2px;
    }
    .status {
      font-size: 11px;
      color: #8492b6;
      margin-top: 2px;
    }

    /* switch buttons */
    .switch-panel {
      background: rgba(30, 36, 54, 0.8);
      border-radius: 40px;
      padding: 4px;
      display: flex;
      gap: 5px;
      backdrop-filter: blur(6px);
    }
    .switch-panel button {
      background: transparent;
      border: none;
      padding: 6px 14px;
      border-radius: 32px;
      font-size: 12px;
      font-weight: 600;
      color: #bfcaf2;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .switch-panel button.active {
      background: #2c6e5c;
      color: white;
      box-shadow: 0 2px 8px rgba(38, 112, 85, 0.3);
    }
    .switch-panel button:first-child.active {
      background: #1f6392;
      box-shadow: 0 2px 10px rgba(26, 95, 140, 0.35);
    }

    /* messages container */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 14px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      min-height: 0;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }
    .chat-messages::-webkit-scrollbar-thumb {
      background: #3f4a6b;
      border-radius: 12px;
    }

    /* message rows */
    .message-row {
      display: flex;
      width: 100%;
      animation: messagePop 0.22s cubic-bezier(0.2, 0.9, 0.4, 1.2);
    }
    @keyframes messagePop {
      0% {
        opacity: 0;
        transform: translateY(12px) scale(0.98);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    .message-left {
      justify-content: flex-start;
    }
    .message-right {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 84%;
      border-radius: 26px;
      padding: 10px 18px;
      position: relative;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }
    .left-bubble {
      background: #1f2a3e;
      border-bottom-left-radius: 7px;
      color: #f0f3fc;
    }
    .right-bubble {
      background: linear-gradient(135deg, #128c7e, #0b6e5c);
      border-bottom-right-radius: 7px;
      color: white;
    }
    .sender-name {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
      opacity: 0.75;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .message-text {
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
      font-weight: 450;
    }
    .timestamp {
      font-size: 9px;
      opacity: 0.6;
      margin-top: 5px;
      text-align: right;
      letter-spacing: 0.2px;
    }

    /* typing indicator - beautifully visible */
    .typing-wrapper {
      display: flex;
      width: 100%;
      margin-bottom: 8px;
      animation: fadeSlide 0.2s ease;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .typing-bubble {
      background: rgba(31, 42, 62, 0.98);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      border-bottom-left-radius: 12px;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
      border: 0.5px solid rgba(110, 200, 255, 0.5);
    }
    .typing-dots {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .typing-dots span {
      width: 9px;
      height: 9px;
      background: #bdd4ff;
      border-radius: 50%;
      animation: typingWave 1.2s infinite ease-in-out;
      box-shadow: 0 0 6px #7aaeff;
    }
    .typing-dots span:nth-child(1) { animation-delay: 0s; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingWave {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-8px); opacity: 1; background: #e2ecff; box-shadow: 0 0 12px #5a9eff; }
    }
    .typing-text {
      font-size: 13px;
      font-weight: 600;
      color: #e6f0ff;
      background: rgba(255,255,245,0.12);
      padding: 4px 12px;
      border-radius: 40px;
    }

    /* input area */
    .input-zone {
      background: #0c111e;
      padding: 14px 16px;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .input-zone input {
      flex: 1;
      background: #1a2136;
      border: 1.5px solid #2a3452;
      padding: 14px 20px;
      border-radius: 40px;
      font-size: 16px;
      color: #ffffff;
      outline: none;
      transition: all 0.2s;
      font-weight: 500;
    }
    .input-zone input:focus {
      background: #222b44;
      border-color: #2f9b82;
      box-shadow: 0 0 0 3px rgba(47, 155, 130, 0.2);
    }
    .input-zone input::placeholder {
      color: #6a7aa3;
      font-size: 15px;
    }
    .send-button {
      background: #1f6e5c;
      border: none;
      width: 52px;
      height: 52px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      color: white;
      font-size: 22px;
      font-weight: 600;
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
    }
    .send-button:hover { background: #2c8e78; transform: scale(0.96); }

    .date-separator {
      text-align: center;
      margin: 10px 0 5px;
      font-size: 11px;
      font-weight: 600;
      color: #99a7d1;
      background: #1a1f2eaa;
      width: fit-content;
      padding: 5px 16px;
      border-radius: 40px;
      align-self: center;
      backdrop-filter: blur(8px);
    }

    .empty-chat-area {
      text-align: center;
      margin-top: 60px;
      color: #5e6e97;
      font-size: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    /* Smart Download Button - Beautiful & Floating */
    .smart-download-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 70px;
      height: 70px;
      border: none;
      outline: none;
      border-radius: 50%;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(0, 114, 255, 0.4), 0 0 15px rgba(0, 198, 255, 0.5);
      transition: all 0.3s ease;
      z-index: 999;
      animation: floatBtn 2.5s ease-in-out infinite;
    }

    .smart-download-btn:hover {
      transform: translateY(-5px) scale(1.08);
      box-shadow: 0 12px 30px rgba(0, 114, 255, 0.6), 0 0 25px rgba(0, 198, 255, 0.8);
    }

    .smart-download-btn:active {
      transform: scale(0.95);
    }

    .smart-download-btn:hover svg {
      transform: translateY(3px);
    }

    @keyframes floatBtn {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    @media (max-width: 768px) {
      .smart-download-btn {
        width: 60px;
        height: 60px;
        bottom: 20px;
        right: 20px;
      }
      .smart-download-btn svg {
        width: 28px;
        height: 28px;
      }
    }

    /* Modal overlay for download prompt */
    .download-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.2s ease;
    }
    .download-modal.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-card {
      background: #11161f;
      border-radius: 48px;
      max-width: 320px;
      width: 85%;
      padding: 28px 24px 32px;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      animation: modalZoom 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
    }
    @keyframes modalZoom {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .modal-card h3 {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #aac8ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }
    .modal-card p {
      color: #9aa9c7;
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.4;
    }
    .modal-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .download-option {
      background: linear-gradient(135deg, #1f6392, #128c7e);
      border: none;
      padding: 14px;
      border-radius: 60px;
      color: white;
      font-weight: 700;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .download-option:hover {
      transform: scale(1.02);
      filter: brightness(1.05);
    }
    .close-modal {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 12px;
      border-radius: 60px;
      color: #ccd9ff;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
    }
    .close-modal:hover {
      background: rgba(255,255,255,0.15);
    }
    .feature-badge {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 16px;
      font-size: 10px;
      color: #5f73a1;
    }
  </style>
</head>
<body>

<div class="phone-device">
 
  <div class="chat-app">
    <div class="chat-header">
      <div class="brand">
        <h2>💕 PL Chat</h2>
        <div class="status" id="liveStatusText"> Precious · online</div>
      </div>
      <div class="switch-panel" id="userSwitcher">
        <button id="person1Btn" class="active">💖 Precious</button>
        <button id="person2Btn">💙 Robbie</button>
      </div>
    </div>

    <div id="chatMessagesContainer" class="chat-messages">
      <div class="empty-chat-area">
        <span>💬 No messages yet</span>
        <span style="font-size:12px;">👇 Type something beautiful 👇</span>
      </div>
    </div>

    <div class="input-zone">
      <input type="text" id="messageField" placeholder="Type a message..." autocomplete="off" />
      <button id="sendMessageBtn" class="send-button" aria-label="Send message">➤</button>
    </div>
  </div>
</div>

<!-- SMART FLOATING DOWNLOAD BUTTON -->
<button class="smart-download-btn" id="floatingDownloadBtn" aria-label="Download App">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="32px" height="32px">
    <path d="M12 16.5L7.5 12L9 10.5L11 12.5V3H13V12.5L15 10.5L16.5 12L12 16.5ZM5 20H19V18H5V20Z" />
  </svg>
</button>

<!-- Download Modal Popup -->
<div id="downloadModal" class="download-modal">
  <div class="modal-card">
    <h3>💕 PL Chat</h3>
    <p>Get the full app experience with push notifications, voice notes & dark mode. Perfect for you and Robbie/Precious!</p>
    <div class="modal-buttons">
      <button id="androidDownloadBtn" class="download-option">
        <span>📱</span> Download for Android
      </button>
      <button id="closeModalBtn" class="close-modal">Maybe later</button>
    </div>
    <div class="feature-badge">
      <span>🔒 Private chats</span>
      <span>💬 Real-time typing</span>
      <span>✨ No auto-reply</span>
    </div>
  </div>
</div>

<script>
  // =============== PRIVATE MESSENGER FOR ROBBIE & PRECIOUS ===============
  // Person 1 = Precious, Person 2 = Robbie
  let currentUser = "Person 1";     // "Person 1" = Precious, "Person 2" = Robbie
  let messages = [];
  let nextMsgId = 1;
  
  const messagesContainer = document.getElementById("chatMessagesContainer");
  const messageInput = document.getElementById("messageField");
  const sendBtn = document.getElementById("sendMessageBtn");
  const person1Btn = document.getElementById("person1Btn");
  const person2Btn = document.getElementById("person2Btn");
  const liveStatusText = document.getElementById("liveStatusText");
  
  let activeTypingTimeout = null;
  let isTypingIndicatorShown = false;
  let currentTypingUser = null;
  
  // NO AUTO-REPLY WHATSOEVER - completely private, no bots
  
  // Time helpers
  function getFormattedTime() {
    const now = new Date();
    let hours = now.getHours();
    const minutes = now.getMinutes().toString().padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;
    return `${hours}:${minutes} ${ampm}`;
  }
  
  function getCurrentDateString() {
    return new Date().toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }
  
  // Helper to get display name
  function getDisplayName(sender) {
    return sender === "Person 1" ? "Precious" : "Robbie";
  }
  
  // Render all messages with date separators
  function renderAllMessages() {
    if (!messagesContainer) return;
    messagesContainer.innerHTML = "";
    if (messages.length === 0) {
      const emptyDiv = document.createElement("div");
      emptyDiv.className = "empty-chat-area";
      emptyDiv.innerHTML = `<span>💬 No messages yet</span><span style="font-size:12px;">👇 Start the conversation 💕</span>`;
      messagesContainer.appendChild(emptyDiv);
      return;
    }
    let lastDate = null;
    for (const msg of messages) {
      if (lastDate !== msg.dateStr) {
        const dateSep = document.createElement("div");
        dateSep.className = "date-separator";
        dateSep.innerText = msg.dateStr;
        messagesContainer.appendChild(dateSep);
        lastDate = msg.dateStr;
      }
      const row = document.createElement("div");
      row.className = `message-row ${msg.sender === "Person 1" ? "message-left" : "message-right"}`;
      const bubble = document.createElement("div");
      bubble.className = `bubble ${msg.sender === "Person 1" ? "left-bubble" : "right-bubble"}`;
      const nameSpan = document.createElement("div");
      nameSpan.className = "sender-name";
      nameSpan.innerHTML = msg.sender === "Person 1" ? "💖 Precious" : "💙 Robbie";
      bubble.appendChild(nameSpan);
      const textSpan = document.createElement("div");
      textSpan.className = "message-text";
      textSpan.innerText = msg.text;
      bubble.appendChild(textSpan);
      const timeSpan = document.createElement("div");
      timeSpan.className = "timestamp";
      timeSpan.innerText = msg.time;
      bubble.appendChild(timeSpan);
      row.appendChild(bubble);
      messagesContainer.appendChild(row);
    }
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }
  
  // Save messages to localStorage - PERSISTENT across refreshes
  function persistMessages() {
    try {
      const toStore = messages.slice(-2000);
      localStorage.setItem("plchat_private_msgs", JSON.stringify(toStore));
    } catch(e) {
      console.warn("Storage failed", e);
    }
  }
  
  // Load messages from localStorage - NO AUTO GENERATED WELCOME MESSAGES
  function loadStoredMessages() {
    const stored = localStorage.getItem("plchat_private_msgs");
    if (stored) {
      try {
        const parsed = JSON.parse(stored);
        if (Array.isArray(parsed) && parsed.length > 0) {
          messages = parsed;
          nextMsgId = Math.max(...parsed.map(m => m.id), 0) + 1;
          renderAllMessages();
          return true;
        }
      } catch(e) {}
    }
    // Start with empty conversation - completely private
    messages = [];
    nextMsgId = 1;
    renderAllMessages();
    persistMessages();
    return false;
  }
  
  // Add message to state and persist
  function addMessage(text, sender) {
    if (!text || text.trim() === "") return false;
    const newMsg = {
      id: nextMsgId++,
      text: text.trim(),
      sender: sender,
      time: getFormattedTime(),
      dateStr: getCurrentDateString(),
      timestamp: Date.now()
    };
    messages.push(newMsg);
    renderAllMessages();
    persistMessages();
    return true;
  }
  
  // Typing indicator (only visual, realistic)
  function showTypingIndicatorForUser(typingUser) {
    const existing = document.getElementById("liveTypingWidget");
    if (existing) existing.remove();
    if (!messagesContainer) return;
    const typingDiv = document.createElement("div");
    typingDiv.id = "liveTypingWidget";
    typingDiv.className = "typing-wrapper";
    typingDiv.style.justifyContent = typingUser === "Person 1" ? "flex-start" : "flex-end";
    const typingName = typingUser === "Person 1" ? "" : "";
    const emoji = typingUser === "Person 1" ? "" : "";
    typingDiv.innerHTML = `
      <div class="typing-bubble">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span class="typing-text">${emoji} ${typingName} ...</span>
      </div>
    `;
    messagesContainer.appendChild(typingDiv);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    isTypingIndicatorShown = true;
    currentTypingUser = typingUser;
  }
  
  function removeTypingIndicator() {
    const el = document.getElementById("liveTypingWidget");
    if (el) el.remove();
    isTypingIndicatorShown = false;
    currentTypingUser = null;
  }
  
  // Show typing from the OTHER user when current user types (realistic phone behavior)
  function onUserTyping() {
    if (activeTypingTimeout) clearTimeout(activeTypingTimeout);
    const otherUser = currentUser === "Person 1" ? "Person 2" : "Person 1";
    if (!isTypingIndicatorShown || currentTypingUser !== otherUser) {
      removeTypingIndicator();
      showTypingIndicatorForUser(otherUser);
    }
    activeTypingTimeout = setTimeout(() => removeTypingIndicator(), 1500);
  }
  
  // Send message - NO AUTO REPLIES EVER
  function sendNewMessage() {
    const rawText = messageInput.value;
    if (!rawText.trim()) {
      messageInput.style.borderColor = "#ff6b6b";
      setTimeout(() => messageInput.style.borderColor = "#2a3452", 300);
      return;
    }
    if (activeTypingTimeout) clearTimeout(activeTypingTimeout);
    removeTypingIndicator();
    addMessage(rawText, currentUser);
    messageInput.value = "";
    messageInput.focus();
    
    // Gentle haptic feedback if supported
    if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(10);
  }
  
  // Switch active user
  function setActiveUser(user) {
    currentUser = user;
    if (user === "Person 1") {
      person1Btn.classList.add("active");
      person2Btn.classList.remove("active");
      liveStatusText.innerText = " Precious · online 💖";
    } else {
      person2Btn.classList.add("active");
      person1Btn.classList.remove("active");
      liveStatusText.innerText = " Robbie · online 💙";
    }
    removeTypingIndicator();
  }
  
  // ---- SMART DOWNLOAD POPUP LOGIC ----
  const floatingBtn = document.getElementById("floatingDownloadBtn");
  const modal = document.getElementById("downloadModal");
  const closeModalBtn = document.getElementById("closeModalBtn");
  const androidBtn = document.getElementById("androidDownloadBtn");
  
  function openModal() {
    modal.classList.add("active");
  }
  function closeModal() {
    modal.classList.remove("active");
  }
  
  function handleDownload(platform) {
    alert(`✨ ${platform} version of PL Chat will be available soon!\n📲 Perfect for you and your special someone 💕`);
    closeModal();
    localStorage.setItem("plchat_download_intent", platform);
    floatingBtn.style.transform = "scale(0.95)";
    setTimeout(() => floatingBtn.style.transform = "", 200);
  }
  
  floatingBtn.addEventListener("click", openModal);
  closeModalBtn.addEventListener("click", closeModal);
  androidBtn.addEventListener("click", () => handleDownload("Android"));
  modal.addEventListener("click", (e) => { if (e.target === modal) closeModal(); });
  
  // Initialize events
  function bindEvents() {
    sendBtn.addEventListener("click", sendNewMessage);
    messageInput.addEventListener("keypress", (e) => { 
      if (e.key === "Enter") {
        e.preventDefault();
        sendNewMessage();
      }
    });
    messageInput.addEventListener("input", (e) => { 
      if (e.target.value.trim().length > 0) {
        onUserTyping();
      } else {
        if (activeTypingTimeout) clearTimeout(activeTypingTimeout);
        removeTypingIndicator();
      }
    });
    person1Btn.addEventListener("click", () => setActiveUser("Person 1"));
    person2Btn.addEventListener("click", () => setActiveUser("Person 2"));
  }
  
  // Initialize app - NO AUTO WELCOME MESSAGES, COMPLETE PRIVACY
  loadStoredMessages();
  setActiveUser("Person 1");
  bindEvents();
  setTimeout(() => {
    if (messagesContainer) messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }, 100);
  
  // Save before page unload (extra safety)
  window.addEventListener("beforeunload", () => {
    persistMessages();
  });
  
  // Optional: Clear any pending auto-reply if something was left (just safety)
  window.addEventListener("load", () => {
    if (window.pendingAutoReplyTimer) clearTimeout(window.pendingAutoReplyTimer);
  });
</script>
</body>
</html>
