version: '3.8'

services:
  chat-app:
    build: .
    container_name: private-chat
    ports:
      - "5000:5000"
    volumes:
      # Mount entire app for development (optional)
      - ./:/app
      # Exclude node_modules from mount
      - /app/node_modules
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=5000
    networks:
      - chat-network

networks:
  chat-network:
    driver: bridge